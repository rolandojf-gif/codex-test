<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copiloto Auditoría VDA 6.3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">

      <!-- ── TOPBAR ─────────────────────────────────────────── -->
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir navegación">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="5" x2="17" y2="5"/>
            <line x1="3" y1="10" x2="17" y2="10"/>
            <line x1="3" y1="15" x2="17" y2="15"/>
          </svg>
        </button>

        <div class="topbar-brand">
          <span class="topbar-tag">VDA 6.3</span>
          <span class="topbar-name">Copiloto de Auditoría</span>
        </div>

        <div class="topbar-context" id="topbarContext">
          <div class="ctx-field">
            <label for="productInput">Producto</label>
            <input
              id="productInput"
              type="text"
              placeholder="Ej: pinza de freno de fundicion nodular"
              autocomplete="off"
            />
          </div>
          <div class="ctx-field">
            <label for="processInput">Proceso / Tecnología</label>
            <input
              id="processInput"
              type="text"
              placeholder="Ej: fundicion + mecanizado + acabado superficial"
              autocomplete="off"
            />
          </div>
        </div>
      </header>

      <!-- ── BODY ───────────────────────────────────────────── -->
      <div class="body-layout">

        <!-- SIDEBAR -->
        <nav class="sidebar" id="sidebar" aria-label="Fases VDA 6.3">
          <div id="sidebarTree" class="sidebar-tree"></div>
        </nav>

        <!-- OVERLAY para cerrar sidebar en mobile -->
        <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

        <!-- MAIN -->
        <main class="main" id="main">

          <!-- Empty state -->
          <div class="empty-state" id="emptyState">
            <div class="empty-arrow">←</div>
            <h2>Selecciona un subapartado</h2>
            <p>Elige una fase y subapartado en el panel izquierdo para ver la guía de auditoría.</p>
          </div>

          <!-- Panel de contenido (oculto hasta selección) -->
          <div class="content-panel" id="contentPanel" hidden>

            <!-- Cabecera de selección -->
            <div class="content-header">
              <div>
                <p id="selectionPath" class="breadcrumb"></p>
                <h2 id="guidanceTitle"></h2>
              </div>
              <span id="guidanceId" class="badge"></span>
            </div>

            <!-- Reglas activas -->
            <div id="appliedRules" class="applied-rules" hidden></div>

            <!-- Bloques de contenido continuo -->
            <section class="content-block block-context" data-field="que_espero_ver" id="block-contexto">
              <h3>Contexto</h3>
              <ul id="queEsperoVer"></ul>
            </section>

            <section class="content-block" data-field="que_pedir" id="block-que-buscar">
              <h3>Qué buscar</h3>
              <ul id="quePedir"></ul>
            </section>

            <section class="content-block" data-field="preguntas_de_contraste" id="block-pregunta">
              <h3>PREGUNTA</h3>
              <ul id="preguntasContraste"></ul>
            </section>

            <section class="content-block block-warn" data-field="red_flags" id="block-trampa">
              <h3>TRAMPA</h3>
              <ul id="redFlags"></ul>
            </section>

            <section class="content-block block-tip" data-field="evidencias_tipicas" id="block-tip">
              <h3>TIP</h3>
              <ul id="evidenciasTipicas"></ul>
            </section>

          </div><!-- /content-panel -->

        </main>
      </div><!-- /body-layout -->

    </div><!-- /app -->

    <script type="module" src="js/app.js"></script>
  </body>
</html>
